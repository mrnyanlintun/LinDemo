<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lin Phase 4A Bridge Diagnostic</title>
  <link rel="stylesheet" href="styles.css?v=phase4a-hotfix-002" />
  <style>
    .diagnostic-wrap { max-width: 1100px; margin: 40px auto; padding: 24px; }
    .diagnostic-actions { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body class="notifications-on" data-theme="dark">
  <div class="diagnostic-wrap panel">
    <p class="eyebrow">Lin Phase 4A</p>
    <h1>Bridge diagnostic page</h1>
    <p>This page tests the Apps Script bridge without using the main HUD navigation code.</p>
    <div class="diagnostic-actions">
      <button class="primary-action" data-action="health">Test health</button>
      <button class="primary-action" data-action="portfolio">Test portfolio</button>
      <button class="primary-action" data-action="project">Test project SYN-DES-001</button>
      <button class="primary-action" data-action="audit">Test audit SYN-DES-001</button>
      <button class="primary-action" data-action="definitions">Test definitions</button>
    </div>
    <pre class="log-console" id="diagnosticLog">Ready. Click a test button.</pre>
  </div>
  <script src="config.js?v=phase4a-hotfix-002"></script>
  <script>
    const log = document.getElementById('diagnosticLog');
    function setLog(value) { log.textContent = typeof value === 'string' ? value : JSON.stringify(value, null, 2); }
    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'linDiagCallback_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');
        const sep = url.includes('?') ? '&' : '?';
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('Timed out waiting for Apps Script response.'));
        }, 20000);
        function cleanup() {
          clearTimeout(timeout);
          if (script.parentNode) script.parentNode.removeChild(script);
          delete window[callbackName];
        }
        window[callbackName] = (payload) => { cleanup(); resolve(payload); };
        script.onerror = () => { cleanup(); reject(new Error('Script load failed. Check the Apps Script deployment access setting.')); };
        script.src = url + sep + 'callback=' + encodeURIComponent(callbackName) + '&_=' + Date.now();
        document.body.appendChild(script);
      });
    }
    function buildUrl(action) {
      const cfg = window.LIN_CONFIG || {};
      const base = cfg.appsScriptApiUrl;
      const params = new URLSearchParams({ action, rootId: cfg.driveRootFolderId || '' });
      if (action === 'project' || action === 'audit') params.set('id', 'SYN-DES-001');
      return base + (base.includes('?') ? '&' : '?') + params.toString();
    }
    document.querySelectorAll('[data-action]').forEach((button) => {
      button.addEventListener('click', async () => {
        const action = button.dataset.action;
        setLog('Running ' + action + '...');
        try {
          const payload = await jsonp(buildUrl(action));
          setLog(payload);
        } catch (err) {
          setLog('ERROR: ' + (err && err.message ? err.message : String(err)));
        }
      });
    });
  </script>
</body>
</html>
